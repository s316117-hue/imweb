<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照相亭 📸</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="../index.html" class="nav-back">👈 回首頁</a>
        <h1>照相亭 📸</h1>
        <div style="width: 80px;"></div>
    </header>

    <div class="booth-container">
        <div class="camera-card">
            <div class="lens">
                <span>🐻</span>
                <p>準備好要拍照了嗎？</p>
                <button style="margin-top: 1rem; background: white; border: 2px solid #FFCA28; color: #FF6F00; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; cursor: pointer;">開啟相機</button>
            </div>
            <button class="shutter-btn">🌟</button>
        </div>

        <div class="gallery">
            <h2>🎞️ 你的相片</h2>
            <div class="photos">
                <div class="polaroid">
                    <div class="polaroid-img">✌️</div>
                </div>
                <div class="polaroid">
                    <div class="polaroid-img">🥰</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
